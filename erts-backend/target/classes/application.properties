# =============================================
# ERTS Backend – application.properties
# =============================================

# ---- Server ----
server.port=8080

# ---- MongoDB ----
# Change this if your MongoDB is on a different host/port
spring.data.mongodb.uri=mongodb://localhost:27017/erts_db
spring.data.mongodb.database=erts_db

# ---- JWT ----
# IMPORTANT: Change this secret to a long random string before going to production
# Must be at least 32 characters
jwt.secret=erts-super-secret-key-change-this-in-production-2025
jwt.expiration-ms=86400000

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Logging ----
logging.level.com.erts=DEBUG
logging.level.org.springframework.data.mongodb=INFO
